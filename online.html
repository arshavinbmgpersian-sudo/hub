<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پخش آنلاین | سریکس دی ال</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b0b0b;
    color:#fff;
    font-family:'Vazirmatn',sans-serif;
}

header{
    background:#111;
    padding:15px;
    text-align:center;
}

header a{
    color:#ff6d00;
    text-decoration:none;
    font-size:16px;
}

.vip-box{
    max-width:420px;
    margin:60px auto;
    background:#111;
    border:1px solid #222;
    border-radius:15px;
    padding:20px;
    text-align:center;
}

.vip-box h2{
    margin-bottom:10px;
}

.vip-box p{
    color:#bbb;
    margin-bottom:15px;
}

.vip-box input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#1a1a1a;
    color:#fff;
    font-family:'Vazirmatn',sans-serif;
    margin-bottom:10px;
}

.vip-box button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#ff6d00;
    color:#fff;
    cursor:pointer;
    font-family:'Vazirmatn',sans-serif;
}

#result{
    margin-top:10px;
    font-size:14px;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
    text-align:center;
}

.container1{
    max-width:300px;
    font-size:6px;
    margin:auto;
    padding:20px;
    text-align:center;
}

.poster{
    width:100%;
    border-radius:12px;
    margin-bottom:15px;
}

h1{
    margin-bottom:10px;
}

.info{
    color:#ccc;
    margin-bottom:20px;
    text-align:center;
}

video{
    width:100%;
    display:block;
    border-radius:12px;
    background:#000;
}

@media screen and (orientation: landscape){

    header,
    .poster,
    h1,
    .info{
        display:none;
        text-align:center;
    }

    .container{
        width:100vw;
        height:100vh;
        max-width:none;
        padding:0;
        margin:0;
    }

    video{
        width:100vw;
        height:100vh;
        object-fit:contain;
        border-radius:0;
    }
}

body.fullscreen-mode header,
body.fullscreen-mode .poster,
body.fullscreen-mode h1,
body.fullscreen-mode .info{
    display:none;
}

body.fullscreen-mode .container{
    width:100vw;
    height:100vh;
    max-width:none;
    padding:0;
    margin:0;
}

body.fullscreen-mode video{
    width:100vw;
    height:100vh;
    border-radius:0;
    object-fit:contain;
}

</style>
</head>
<body>

<header>
    <a href="https://t.me/SeriexDL">← کانال تلگرام</a>
</header>

<!-- باکس اشتراک -->

<div id="vip-box" class="vip-box">

    <h2>فعال‌سازی اشتراک</h2>

    <p>
        جهت فعال شدن قابلیت پخش آنلاین، کد اشتراک خود را وارد کنید
    </p>

    <input
        type="text"
        id="code"
        placeholder="کد اشتراک">

    <button onclick="checkVip()">
        ورود
    </button>

    <div id="result"></div>

</div>

<!-- محتوای محافظت شده -->

<div id="protected-content" style="display:none;">

    <div class="container">

        <h1>Game Of Thrones</h1>

        <p class="info">
            S01E01 - 480p HardSub
        </p>

        <video id="player" controls playsinline>
            <source src="https://abrehamrahi.ir/o/public/xbHRqqJD/">
            مرورگر شما از پخش ویدیو پشتیبانی نمی‌کند.
        </video>

    </div>

    <div class="container1">
        <h1>تمامی حقوق برای وبسایت سریکس دی ال محفوظ است</h1>
    </div>

</div>

<script>

async function checkVip(){

    const code =
    document.getElementById("code").value.trim();

    if(!code){
        document.getElementById("result").innerHTML =
        "کد اشتراک را وارد کنید";
        return;
    }

    try{

        const res = await fetch("/check",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                code:code
            })

        });

        const data = await res.json();

        if(data.valid){

            localStorage.setItem(
                "vipCode",
                code
            );

            document.getElementById("vip-box")
            .style.display = "none";

            document.getElementById("protected-content")
            .style.display = "block";

        }else{

            document.getElementById("result")
            .innerHTML = "❌ " + data.message;

        }

    }catch(err){

        document.getElementById("result")
        .innerHTML =
        "خطا در ارتباط با سرور";

    }

}

window.addEventListener("load", async()=>{

    const savedCode =
    localStorage.getItem("vipCode");

    if(!savedCode) return;

    try{

        const res = await fetch("/check",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                code:savedCode
            })

        });

        const data = await res.json();

        if(data.valid){

            document.getElementById("vip-box")
            .style.display = "none";

            document.getElementById("protected-content")
            .style.display = "block";

        }

    }catch(e){}

});

const player = document.getElementById("player");

document.addEventListener("fullscreenchange", () => {

    if (document.fullscreenElement) {

        document.body.classList.add("fullscreen-mode");

        if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock("landscape").catch(() => {});
        }

    } else {

        document.body.classList.remove("fullscreen-mode");

        if (screen.orientation && screen.orientation.unlock) {
            screen.orientation.unlock();
        }

    }

});

player.addEventListener("dblclick", () => {

    if (!document.fullscreenElement) {

        if (player.requestFullscreen) {
            player.requestFullscreen();
        }

    } else {

        if (document.exitFullscreen) {
            document.exitFullscreen();
        }

    }

});

</script>

</body>
</html>
